spring.application.name=quintkard-app

# Server
server.port=8080

# Admin user
quintkard.user.admin.user-id=admin
quintkard.user.admin.display-name=Admin
quintkard.user.admin.email=admin@quintkard.io
quintkard.user.admin.password=admin
quintkard.user.admin.redaction-enabled=false

# Database connection
spring.datasource.url=jdbc:postgresql://localhost:5432/quintkard
spring.datasource.username=quintkard
spring.datasource.password=quintkard
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=validate

# Embeddings
spring.ai.model.chat=google-genai
spring.ai.model.embedding=google-genai
spring.ai.model.embedding.text=google-genai

# Vertex AI configuration (configure google application default credentials if using vertex AI)
spring.ai.google.genai.vertex-ai=true
spring.ai.google.genai.project-id=bpk-poc-project
spring.ai.google.genai.location=us-central1
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.embedding.vertex-ai=true
spring.ai.google.genai.embedding.project-id=bpk-poc-project
spring.ai.google.genai.embedding.location=us-central1
spring.ai.google.genai.embedding.text.options.model=gemini-embedding-001

# Gemini Developer API / AI Studio key configuration
# spring.ai.google.genai.api-key=${GOOGLE_API_KEY:}
# spring.ai.google.genai.embedding.api-key=${GOOGLE_API_KEY:}

# OpenAI configuration
spring.ai.model.audio.speech=none
spring.ai.model.audio.transcription=none
spring.ai.model.image=none
spring.ai.model.moderation=none
quintkard.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.base-url=https://api.openai.com
spring.ai.openai.chat.options.model=gpt-5.4-mini

quintkard.embedding.model=gemini-embedding-001
quintkard.embedding.selection.provider=GOOGLE_GENAI
quintkard.embedding.chunking-strategy=summary-and-content-v1
quintkard.embedding.batch-size=16
quintkard.embedding.dimensions=3072
quintkard.embedding.max-semantic-distance=0.45
quintkard.agent.execution.max-iterations=30
quintkard.agent.execution.max-tool-calls=100

# Security
quintkard.security.cors.allowed-origins=http://localhost:3000

# Message queue
quintkard.message.queue.enabled=true
quintkard.message.queue.batch-size=10
quintkard.message.queue.poll-delay-ms=5000
quintkard.message.queue.core-pool-size=1
quintkard.message.queue.max-pool-size=1
quintkard.message.queue.queue-capacity=1
quintkard.message.queue.await-termination-seconds=30
